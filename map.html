<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hi human! map</title>
  <style>
    @font-face {
      font-family: 'SchoolSafetyGoodSupport';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2307-2@1.0/HakgyoansimBareondotumR.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }

    @font-face {
      font-family: 'SchoolSafetyGoodSupport';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2307-2@1.0/HakgyoansimBareondotumB.woff2') format('woff2');
      font-weight: 700;
      font-display: swap;
    }

    body {
      margin: 0;
      height: 100vh;
      background: url('map/bg.png') no-repeat center center;
      background-size: cover;
      background-attachment: fixed;
      font-family: 'SchoolSafetyGoodSupport', sans-serif;
      position: relative;
    }
    
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('map/halftone_pattern.png') repeat;
      opacity: 0.15;
      z-index: 1;
      pointer-events: none;
    }

    .btn {
      position: absolute;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .text{
      color: rgb(34, 0, 255);
      font-size: 1.7vw;
      font-weight: normal;
      text-decoration: underline; text-underline-offset: 0.2em;
    }

    .stage-container {
      position: absolute;
      text-align: center;
      display: inline-block;
    }

    .stage-container img {
      width: 10vw;
      height: auto;
      display: block;
    }
    
    .stage-container .text {
      margin-top: -1.9em;
      color: rgb(34,0,255);
      font-size: 1.7vw;
      text-decoration: underline;
      text-underline-offset: 0.2em;
      z-index: 6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }
    a:visited, a:active {
      color: inherit;
      text-decoration: none;
    }

    .text:hover {
      color: rgb(34,0,255);
      text-shadow: 0 0 10px rgba(34,0,255,0.8);
    }

    .bbt:hover {
      color: white;
      text-shadow: 0 0 10px rgba(34,0,255,0.8);
    }

    .stage-container img {
      width: 8vw;
      transition: transform 0.3s ease, filter 0.3s ease;
    }
    .stage-container img:hover {
      transform: scale(1.1);
      filter: drop-shadow(0 0 10px rgb(45,146,255))
      drop-shadow(0 0 10px rgb(45,146,255)); z-index: 1;
    }

    .stage-container .text {
      margin-top: -1.9em;
      color: rgb(34,0,255);
      font-size: 1.4vw;
      font-weight: normal;
      text-decoration: underline;
      text-underline-offset: 0.2em;
      position: relative;
      z-index: 6;
    }

    .locked {
      filter: grayscale(100%);
      opacity: 0.6;
      pointer-events: none;
      cursor: default;
    }

    .locked .text {
      text-decoration: none;
    }
    .icon-btn {
      position: absolute;
      cursor: pointer;
      width: 4.3vw;
      height: 4.3vw;
      z-index: 100;
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
      transition: transform 0.2s ease, background-image 0.2s ease;
    }
    .icon-btn:hover {
      transform: scale(1.1);
    }
    #back-btn {
      top: 4%;
      left: 3%;
      background-image: url('map/b.png');
    }
    #back-btn:hover {
      background-image: url('map/-b.png');
    }
    #bgm-btn {
      top: 4%;
      left: 8%;
      background-image: url('map/b2.png');
    }
    #home-btn {
      top: 4%;
      right: 3%;
      background-image: url('map/b4.png');
    }
    #home-btn:hover {
      background-image: url('map/-b4.png');
    }
  </style>
</head>
<body>
  <audio id="bgm" loop>
    <source src="bgm.mp3" type="audio/mpeg">
  </audio>
  <img src="map/logo.png" alt="Hi Human Thumbnail" class="btn" style="top: 16%; left: 50%;transform: translateX(-50%); width: 36vw; height: auto;">

  <div class="stage-container" data-stage="1" style="top:41%; left:17%;">
    <a href="1.html">
      <img src="map/1.png" alt="Stage 1">
      <div class="text">Stage 1</div>
    </a>
  </div>

  <div class="stage-container" data-stage="2" style="top:41%; left:50%; transform: translateX(-50%)">
    <a href="2.html">
      <img src="map/2.png" alt="Stage 2">
      <div class="text">Stage 2</div>
    </a>
  </div>

  <div class="stage-container" data-stage="3" style="top:41%; right:17%;">
    <a href="3.html">
      <img src="map/3.png" alt="Stage 3">
      <div class="text">Stage 3</div>
    </a>
  </div>

  <div class="stage-container" data-stage="4" style="top: 66%; left: 31%; ">
    <a href="4.html">
      <img src="map/4.png" alt="Stage 4">
      <div class="text">Stage 4</div>
    </a>
  </div>

  <div class="stage-container" data-stage="5" style="top: 66%; right: 31%; ">
    <a href="5.html">
      <img src="map/5.png" alt="Stage 5">
      <div class="text">Stage 5</div>
    </a>
  </div>

<a href="index.html#main-menu-screen" id="back-btn" class="icon-btn" aria-label="뒤로가기"></a>
<div id="bgm-btn" class="icon-btn" role="button" aria-label="BGM 재생/정지"></div>
<a href="index.html" id="home-btn" class="icon-btn" aria-label="홈으로"></a>

  <script>
    const bgm = document.getElementById("bgm");
    const bgmBtn = document.getElementById("bgm-btn");
    let isPlaying = false;
    
    bgmBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      if (isPlaying) {
        bgm.pause();
        isPlaying = false;
        bgmBtn.style.backgroundImage = "url('map/b3.png')";
      } else {
        bgm.play();
        isPlaying = true;
        bgmBtn.style.backgroundImage = "url('map/b2.png')";
      }
    });

    bgmBtn.addEventListener('mouseover', () => {
        if (isPlaying) {
            bgmBtn.style.backgroundImage = "url('map/-b2.png')";
        } else {
            bgmBtn.style.backgroundImage = "url('map/-b3.png')";
        }
        bgmBtn.style.transform = 'scale(1.1)';
    });

    bgmBtn.addEventListener('mouseout', () => {
        if (isPlaying) {
            bgmBtn.style.backgroundImage = "url('map/b2.png')";
        } else {
            bgmBtn.style.backgroundImage = "url('map/b3.png')";
        }
        bgmBtn.style.transform = 'scale(1)';
    });

    document.addEventListener("DOMContentLoaded", function() {
      // 5단계에서 돌아온 플래그가 있는지 확인
      const returnedFromStage5 = localStorage.getItem('returnedFromStage5');

      if (returnedFromStage5 === 'true') {
          // 플래그가 있으면 엔딩 팝업과 함께 이동
          alert("너무 많은 오류가 발생해서 인간 증명 시스템이 붕괴되었습니다.\n\n!에러가 발생합니다!");
          
          // 플래그를 삭제하여 다음 방문 시에는 실행되지 않도록 함
          localStorage.removeItem('returnedFromStage5');

          // 팝업을 닫으면 6.html로 이동
          window.location.href = '6.html';
      }

      // 스테이지 잠금 로직 (기존과 동일)
      const clearedStage = parseInt(localStorage.getItem('clearedStage') || '0');
      const stages = document.querySelectorAll('.stage-container');

      stages.forEach(stage => {
        const stageNumber = parseInt(stage.dataset.stage);
        if (stageNumber > clearedStage + 1) {
          stage.classList.add('locked');
        }
      });
    });

window.addEventListener('load', () => {
    
    // 1. 브라우저 저장소에서 'unlocked_stage_6' 값이 'true'인지 확인합니다.
    const isStage6Unlocked = localStorage.getItem('unlocked_stage_6');

    if (isStage6Unlocked === 'true') {
        
        // 2. 5단계 아이콘/링크를 찾습니다. (id="stage-5-link" 부분은 실제 id로 바꿔주세요)
        const stage5LinkElement = document.getElementById('stage-5-link'); 

        if (stage5LinkElement) {
            // 3. 5단계 아이콘의 링크를 'stage6.html'로 덮어씌웁니다.
            stage5LinkElement.href = 'stage6.html';
            
            // (선택 사항) 아이콘 모양이나 텍스트도 바꿀 수 있습니다.
            // stage5LinkElement.querySelector('img').src = 'new-icon-for-stage6.png';
        }
    }
});
  </script>
</body>
</html>
